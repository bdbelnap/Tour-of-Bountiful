<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour of Bountiful 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Standard Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- KEYS VERIFIED FROM SCREENSHOT ---
        const config = {
            apiKey: "AIzaSyCdVLXV3UNVkgusZ8UcaYXAKDjw-aH3-iE",
            authDomain: "tour-of-bountiful.firebaseapp.com",
            projectId: "tour-of-bountiful",
            storageBucket: "tour-of-bountiful.firebasestorage.app",
            messagingSenderId: "805576976058",
            appId: "1:805576976058:web:076572b23cf4f1b23dc483",
            measurementId: "G-5DPMZ6H2DT"
        };

        const App = () => {
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState("Connecting...");
            const [log, setLog] = useState("");
            const [view, setView] = useState('home');
            const [registrations, setRegistrations] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [repairKey, setRepairKey] = useState("");
            const [repairStatus, setRepairStatus] = useState("idle"); // idle, loading, success, fail
            const [formData, setFormData] = useState({ teamName: '', email: '', p1Name: '', p1Handicap: '', p2Name: '', p2Handicap: '', p3Name: '', p3Handicap: '', p4Name: '', p4Handicap: '' });

            const startFirebase = (customKey = null) => {
                if (!window.firebase) return;
                try {
                    // Clean up any old attempts
                    if (firebase.apps.length) firebase.apps.forEach(a => a.delete());
                    
                    const finalConfig = { ...config };
                    if (customKey) finalConfig.apiKey = customKey.trim();

                    const app = firebase.initializeApp(finalConfig);
                    const _db = firebase.firestore();
                    const _auth = firebase.auth();
                    setDb(_db);
                    
                    _auth.signInAnonymously()
                        .then((res) => {
                            setUser(res.user);
                            setStatus("Connected");
                            setLog("");
                            if (customKey) setRepairStatus("success");
                        })
                        .catch(err => {
                            setStatus("Auth Error");
                            setLog(err.message);
                            if (customKey) setRepairStatus("fail");
                        });

                    _db.collection("registrations").onSnapshot(
                        (s) => setRegistrations(s.docs.map(d => ({id: d.id, ...d.data()}))),
                        (e) => setLog(`DB Error: ${e.message}`)
                    );
                } catch (e) { 
                    setStatus("Init Error");
                    setLog(e.message);
                }
            };

            useEffect(() => {
                startFirebase();
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [view, registrations, showSuccess, status, repairStatus]);

            const onRegister = async (e) => {
                e.preventDefault();
                if (!user) return;
                setIsSubmitting(true);
                try {
                    const data = { ...formData, timestamp: firebase.firestore.FieldValue.serverTimestamp(), userId: user.uid };
                    await db.collection("registrations").add(data);
                    setShowSuccess(true);
                    setTimeout(() => { setShowSuccess(false); setView('players'); }, 2000);
                } catch (err) { alert(`Error: ${err.message}`); }
                setIsSubmitting(false);
            };

            const handleRepair = () => {
                setRepairStatus("loading");
                startFirebase(repairKey);
            };

            return (
                <div className="min-h-screen bg-stone-50 font-sans text-slate-900 pb-20">
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 h-16 flex items-center px-4 justify-between">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-emerald-700 p-2 rounded text-white"><i data-lucide="mountain" size={18}></i></div>
                            <span className="font-bold text-xl uppercase italic">Tour of <span className="text-emerald-700">Bountiful</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('players')} className="text-[10px] font-black uppercase text-slate-500">The Field</button>
                            <button onClick={() => setView('register')} className="px-4 py-2 rounded-lg font-black text-[10px] uppercase italic bg-emerald-700 text-white shadow-md">Sign Up</button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'home' && (
                            <div className="space-y-12">
                                <section className="relative rounded-[3rem] overflow-hidden bg-emerald-950 text-white py-24 px-8 shadow-2xl min-h-[500px] flex items-center">
                                    <div className="absolute inset-0 opacity-40 bg-cover bg-center" style={{backgroundImage: "url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?q=80&w=2070')"}}></div>
                                    <div className="absolute inset-0 bg-gradient-to-r from-emerald-950 via-emerald-950/70 to-transparent"></div>
                                    <div className="relative z-10 max-w-2xl">
                                        <h1 className="text-6xl md:text-8xl font-black mb-2 uppercase italic leading-none tracking-tighter">Tour of <br/><span className="text-emerald-400">Bountiful</span></h1>
                                        <p className="text-2xl font-black mb-8 uppercase italic opacity-90">54 holes. Total Net Score.</p>
                                        <button onClick={() => setView('register')} className="bg-white text-emerald-900 px-10 py-5 rounded-xl font-black text-xl uppercase italic shadow-xl">Sign My Team Up</button>
                                    </div>
                                </section>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-stone-200 shadow-sm flex gap-6">
                                        <div className="text-emerald-700 bg-emerald-50 p-4 rounded-xl h-fit font-black text-2xl">#</div>
                                        <div><h3 className="text-2xl font-black uppercase italic mb-2">Net Score wins</h3><p className="text-slate-500">Every stroke counts across Eaglewood, Bountiful Ridge, and Lakeside.</p></div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-stone-200 shadow-sm flex gap-6">
                                        <div className="text-emerald-700 bg-emerald-50 p-4 rounded-xl h-fit font-black text-2xl">$</div>
                                        <div><h3 className="text-2xl font-black uppercase italic mb-2">Prize Pool</h3><p className="text-slate-500">Winner takes the bag. Entry stakes collected at the first tee.</p></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-stone-200 overflow-hidden">
                                <div className="bg-emerald-800 p-10 text-white"><h2 className="text-4xl font-black uppercase italic tracking-tighter leading-none">Register Team</h2></div>
                                {showSuccess ? <div className="p-20 text-center"><h3 className="text-2xl font-black uppercase italic">Team Locked In!</h3></div> : (
                                    <form onSubmit={onRegister} className="p-10 space-y-6">
                                        <input required placeholder="Team Name" value={formData.teamName} onChange={(e) => setFormData({...formData, teamName: e.target.value})} className="w-full p-4 bg-stone-50 rounded-xl border border-stone-200 font-bold outline-none" />
                                        <input required type="email" placeholder="Captain Email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full p-4 bg-stone-50 rounded-xl border border-stone-200 font-bold outline-none" />
                                        <div className="space-y-4 pt-4 border-t border-stone-100">
                                            {[1, 2, 3, 4].map(n => (
                                                <div key={n} className="grid grid-cols-2 gap-4">
                                                    <input required placeholder={`Player ${n}`} value={formData[`p${n}Name`]} onChange={(e) => setFormData({...formData, [`p${n}Name`]: e.target.value})} className="p-3 bg-stone-50 rounded-lg border border-stone-200 font-bold text-sm" />
                                                    <input required type="number" step="0.1" placeholder="HC" value={formData[`p${n}Handicap`]} onChange={(e) => setFormData({...formData, [`p${n}Handicap`]: e.target.value})} className="p-3 bg-stone-50 rounded-lg border border-stone-200 font-bold text-sm" />
                                                </div>
                                            ))}
                                        </div>
                                        <button type="submit" disabled={isSubmitting || !user} className="w-full py-5 bg-emerald-700 text-white rounded-xl font-black text-xl uppercase italic shadow-lg flex justify-center items-center gap-2 disabled:bg-stone-300">
                                            {isSubmitting ? <i data-lucide="loader-2" className="animate-spin"></i> : user ? 'Register Team' : 'Connecting to Database...'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'players' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <h2 className="text-5xl font-black uppercase italic tracking-tighter text-center">The Field</h2>
                                <div className="grid gap-6">
                                    {registrations.length === 0 ? <div className="text-center py-20 text-slate-300 font-black uppercase italic text-2xl tracking-tighter">No teams joined yet</div> : registrations.map(reg => (
                                        <div key={reg.id} className="bg-white p-8 rounded-[2rem] border border-stone-200 shadow-sm">
                                            <div className="flex justify-between items-center mb-6 pb-6 border-b border-stone-100">
                                                <h3 className="font-black text-3xl uppercase italic tracking-tighter">{reg.teamName}</h3>
                                                <div className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase italic tracking-tighter">Locked In</div>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {[1, 2, 3, 4].map(n => (
                                                    <div key={n} className="bg-stone-50 p-4 rounded-xl">
                                                        <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-1"><span>P{n}</span><span className="text-emerald-600 font-black">HC: {reg[`p${n}Handicap`]}</span></div>
                                                        <div className="font-bold text-slate-800 truncate text-sm">{reg[`p${n}Name`]}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* V6.0 THE FINAL STAND STATUS BAR */}
                    <div className={`fixed bottom-0 left-0 right-0 py-3 px-6 text-[10px] font-black uppercase tracking-widest border-t shadow-2xl z-[100] flex flex-col md:flex-row justify-between items-center transition-all ${user ? 'bg-emerald-900 text-emerald-100 border-emerald-800' : 'bg-red-900 text-red-100 border-red-800'}`}>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${user ? 'bg-emerald-400' : 'bg-red-400 status-pulse'}`}></div>
                                <span>STATUS: {user ? 'Connected' : status}</span>
                            </div>
                            {log && <div className="bg-black/20 px-2 py-1 rounded truncate max-w-[400px]">LOG: {log}</div>}
                        </div>
                        
                        <div className="flex items-center gap-3">
                            {!user && (
                                <div className="flex items-center gap-2 bg-white/10 p-1 rounded">
                                    <input 
                                        className="bg-black/40 border-none outline-none px-2 py-1 rounded text-white font-mono w-40" 
                                        placeholder="Paste API Key..." 
                                        value={repairKey}
                                        onChange={(e) => setRepairKey(e.target.value)}
                                    />
                                    <button onClick={handleRepair} className="bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition-all">
                                        {repairStatus === 'loading' ? 'Testing...' : repairStatus === 'success' ? 'SUCCESS' : repairStatus === 'fail' ? 'FAILED' : 'Apply Fix'}
                                    </button>
                                </div>
                            )}
                            <div className="opacity-50 italic">V6.0 FINAL STAND</div>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
