<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour of Bountiful 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase Module Script: This handles imports correctly without Babel interference -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Export to window so Babel script can access them
        window.fb = {
            initializeApp,
            getFirestore,
            collection,
            addDoc,
            updateDoc,
            onSnapshot,
            doc,
            getAuth,
            signInAnonymously,
            onAuthStateChanged
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        /** * IMPORTANT: REPLACE THE PLACEHOLDERS BELOW WITH YOUR ACTUAL FIREBASE CONFIG
         * To get these:
         * 1. Go to console.firebase.google.com
         * 2. Create a project "Tour of Bountiful"
         * 3. Add a "Web App"
         * 4. Copy the firebaseConfig object they give you here.
         */
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase services using the globally exported functions
        let db, auth;
        const initFirebase = () => {
            if (!window.fb) return false;
            try {
                const app = window.fb.initializeApp(firebaseConfig);
                db = window.fb.getFirestore(app);
                auth = window.fb.getAuth(app);
                return true;
            } catch (e) {
                console.warn("Firebase config is missing or invalid. Signups will not save until you add your keys.");
                return false;
            }
        };

        // Tournament Settings
        const MAX_TEAMS = 9;
        const TOURNAMENT_DATE = "Date TBD";
        const TOURNAMENT_YEAR = "2026";
        const ADMIN_UID = ""; // Paste your UID here later to edit any team

        // Icon Components
        const Mountain = () => <i data-lucide="mountain"></i>;
        const DollarSign = () => <i data-lucide="dollar-sign"></i>;
        const Calendar = () => <i data-lucide="calendar"></i>;
        const ChevronRight = () => <i data-lucide="chevron-right"></i>;
        const Target = () => <i data-lucide="target"></i>;
        const Trophy = () => <i data-lucide="trophy"></i>;
        const Users = () => <i data-lucide="users"></i>;
        const CheckCircle2 = () => <i data-lucide="check-circle-2"></i>;
        const Edit2 = () => <i data-lucide="edit-2"></i>;
        const Settings = () => <i data-lucide="settings"></i>;
        const Flag = () => <i data-lucide="flag"></i>;
        const Waves = () => <i data-lucide="waves"></i>;
        const AlertCircle = () => <i data-lucide="alert-circle"></i>;
        const Loader2 = () => <i data-lucide="loader-2" className="animate-spin"></i>;

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [registrations, setRegistrations] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                teamName: '', email: '',
                p1Name: '', p1Handicap: '',
                p2Name: '', p2Handicap: '',
                p3Name: '', p3Handicap: '',
                p4Name: '', p4Handicap: '',
                shirtSize: 'M'
            });

            useEffect(() => {
                const ready = initFirebase();
                if (ready && auth) {
                    window.fb.signInAnonymously(auth).catch(console.error);
                    window.fb.onAuthStateChanged(auth, setUser);
                }
                // Initialize Lucide icons on start
                setTimeout(() => lucide.createIcons(), 200);
            }, []);

            useEffect(() => {
                if (!db || !user || !window.fb) return;
                const unsub = window.fb.onSnapshot(window.fb.collection(db, "registrations"), (snap) => {
                    setRegistrations(snap.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return unsub;
            }, [user]);

            // Re-initialize icons whenever the view changes or data updates
            useEffect(() => { 
                lucide.createIcons(); 
            }, [view, registrations, showSuccess]);

            const handleInputChange = (e) => {
                setFormData({...formData, [e.target.name]: e.target.value});
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!db || !user || !window.fb) {
                    alert("Database not connected. Please add your Firebase config keys to the code.");
                    return;
                }
                setIsSubmitting(true);
                try {
                    if (editingId) {
                        await window.fb.updateDoc(window.fb.doc(db, "registrations", editingId), {
                            ...formData, 
                            lastUpdated: new Date().toISOString()
                        });
                    } else {
                        await window.fb.addDoc(window.fb.collection(db, "registrations"), {
                            ...formData, 
                            userId: user.uid, 
                            timestamp: new Date().toISOString()
                        });
                    }
                    setShowSuccess(true);
                    setTimeout(() => { 
                        setShowSuccess(false); 
                        setView('players'); 
                        setEditingId(null); 
                    }, 2000);
                } catch (err) { 
                    console.error(err); 
                }
                setIsSubmitting(false);
            };

            const isFull = registrations.length >= MAX_TEAMS;
            const canEdit = (reg) => user && (user.uid === reg.userId || user.uid === ADMIN_UID);

            return (
                <div className="min-h-screen bg-stone-50 font-sans text-slate-900">
                    <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                                <div className="bg-emerald-700 p-2 rounded-lg text-white flex items-center"><Mountain /></div>
                                <span className="font-bold text-xl uppercase italic tracking-tighter">Tour of <span className="text-emerald-700">Bountiful</span></span>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setView('players')} className="text-xs font-black uppercase tracking-widest text-slate-500">The Field</button>
                                <button 
                                    onClick={() => { setView('register'); setEditingId(null); }}
                                    disabled={isFull && !editingId}
                                    className={`px-4 py-2 rounded-lg font-black text-xs uppercase italic tracking-tighter transition-all ${isFull && !editingId ? 'bg-stone-200 text-stone-400' : 'bg-emerald-700 text-white shadow-md'}`}
                                >
                                    {isFull ? 'Tournament Full' : 'Sign Up'}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'home' && (
                            <div className="space-y-12">
                                <section className="relative rounded-[3rem] overflow-hidden bg-emerald-950 text-white py-24 px-8 md:px-16 shadow-2xl min-h-[500px] flex items-center">
                                    <div className="absolute inset-0 opacity-50 bg-cover bg-center" style={{backgroundImage: "url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?q=80&w=2070')"}}></div>
                                    <div className="absolute inset-0 bg-gradient-to-r from-emerald-950 via-emerald-950/70 to-transparent"></div>
                                    <div className="relative z-10 max-w-2xl">
                                        <div className="flex items-center gap-2 mb-6 uppercase tracking-widest text-xs font-bold text-emerald-400">
                                            <Calendar /> {TOURNAMENT_DATE}
                                        </div>
                                        <h1 className="text-5xl md:text-8xl font-black mb-2 uppercase italic leading-none tracking-tighter">Tour of <br/><span className="text-emerald-400">Bountiful</span></h1>
                                        <p className="text-2xl font-black mb-8 uppercase italic opacity-90 tracking-tighter">54 holes.</p>
                                        <button onClick={() => setView('register')} className="bg-white text-emerald-900 px-10 py-5 rounded-xl font-black text-xl uppercase italic shadow-xl tracking-tighter">Sign My Team Up</button>
                                    </div>
                                </section>
                                
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-stone-200 shadow-sm flex gap-6">
                                        <div className="text-emerald-700 bg-emerald-50 p-4 rounded-xl h-fit"><Target size={32} /></div>
                                        <div>
                                            <h3 className="text-2xl font-black uppercase italic mb-2 tracking-tighter">Net Score Wins</h3>
                                            <p className="text-slate-500">Handicaps level the field. Every stroke counts across Eaglewood, Bountiful Ridge, and Lakeside.</p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[2.5rem] border border-stone-200 shadow-sm flex gap-6">
                                        <div className="text-emerald-700 bg-emerald-50 p-4 rounded-xl h-fit"><DollarSign size={32} /></div>
                                        <div>
                                            <h3 className="text-2xl font-black uppercase italic mb-2 tracking-tighter">Prize Pool</h3>
                                            <p className="text-slate-500">Entry stakes collected at the first tee. Winner takes the pot for the low net total across 54 holes.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'register' && (
                            <div className="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-stone-200 overflow-hidden">
                                <div className="bg-emerald-800 p-10 text-white">
                                    <h2 className="text-4xl font-black uppercase italic tracking-tighter">{editingId ? 'Edit Team' : 'Register Team'}</h2>
                                    <p className="text-emerald-100 uppercase text-xs font-bold tracking-widest">{TOURNAMENT_DATE}</p>
                                </div>
                                {showSuccess ? (
                                    <div className="p-20 text-center flex flex-col items-center">
                                        <div className="text-emerald-600 mb-4"><CheckCircle2 size={64} /></div>
                                        <h3 className="text-2xl font-bold uppercase italic tracking-tighter">Success!</h3>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubmit} className="p-10 space-y-8">
                                        <div className="space-y-4">
                                            <div className="space-y-1">
                                                <label className="text-xs font-black uppercase text-slate-400 tracking-widest">Team Name</label>
                                                <input required name="teamName" value={formData.teamName} onChange={handleInputChange} className="w-full p-4 bg-stone-50 rounded-xl border border-stone-200 focus:ring-2 focus:ring-emerald-500 outline-none font-bold" placeholder="Bountiful Bandits" />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-xs font-black uppercase text-slate-400 tracking-widest">Captain Email</label>
                                                <input required name="email" value={formData.email} onChange={handleInputChange} className="w-full p-4 bg-stone-50 rounded-xl border border-stone-200 focus:ring-2 focus:ring-emerald-500 outline-none font-bold" placeholder="captain@email.com" />
                                            </div>
                                        </div>
                                        <div className="space-y-6 pt-6 border-t border-stone-100">
                                            <h3 className="flex items-center gap-2 font-black uppercase italic tracking-tighter text-emerald-800">
                                                <Users size={18} /> The Players
                                            </h3>
                                            {[1, 2, 3, 4].map(n => (
                                                <div key={n} className="grid grid-cols-2 gap-4 pb-4 border-b border-stone-50 last:border-0">
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Player {n} Name</label>
                                                        <input required name={`p${n}Name`} value={formData[`p${n}Name`]} onChange={handleInputChange} className="w-full p-3 bg-stone-50 rounded-lg border-none ring-1 ring-stone-200 focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-sm" />
                                                    </div>
                                                    <div className="space-y-1">
                                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Handicap</label>
                                                        <input required type="number" step="0.1" name={`p${n}Handicap`} value={formData[`p${n}Handicap`]} onChange={handleInputChange} className="w-full p-3 bg-stone-50 rounded-lg border-none ring-1 ring-stone-200 focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-sm" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <button type="submit" disabled={isSubmitting} className="w-full py-5 bg-emerald-700 text-white rounded-xl font-black text-xl uppercase italic shadow-lg tracking-tighter">
                                            {isSubmitting ? 'Syncing...' : editingId ? 'Update Team' : 'Register Team'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {view === 'players' && (
                            <div className="max-w-4xl mx-auto space-y-8">
                                <div className="text-center">
                                    <h2 className="text-5xl font-black uppercase italic tracking-tighter">The Field</h2>
                                    <p className="text-emerald-700 font-bold uppercase tracking-widest text-sm">{registrations.length} of {MAX_TEAMS} Teams Locked In</p>
                                </div>
                                <div className="grid gap-6">
                                    {registrations.length === 0 ? (
                                        <div className="text-center py-20 bg-white rounded-[2rem] border border-stone-200 text-slate-300 font-black uppercase italic text-2xl tracking-tighter">The Field is Empty</div>
                                    ) : (
                                        registrations.map(reg => (
                                            <div key={reg.id} className="bg-white p-8 rounded-[2rem] border border-stone-200 shadow-sm hover:border-emerald-500 transition-all group">
                                                <div className="flex justify-between items-center mb-6 pb-6 border-b border-stone-100">
                                                    <h3 className="font-black text-3xl uppercase italic tracking-tighter">{reg.teamName}</h3>
                                                    <div className="flex items-center gap-3">
                                                        {canEdit(reg) && (
                                                            <button 
                                                                onClick={() => {
                                                                    setEditingId(reg.id);
                                                                    setFormData({...reg});
                                                                    setView('register');
                                                                    window.scrollTo(0,0);
                                                                }}
                                                                className="p-3 bg-stone-100 text-stone-600 rounded-xl font-bold text-xs uppercase flex items-center gap-2"
                                                            >
                                                                <Edit2 size={14} /> Edit
                                                            </button>
                                                        )}
                                                        <div className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black uppercase italic tracking-tighter">Locked In</div>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    {[1, 2, 3, 4].map(n => (
                                                        <div key={n} className="bg-stone-50 p-4 rounded-xl border border-stone-100 group-hover:bg-emerald-50 transition-colors">
                                                            <div className="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-1 tracking-tighter">
                                                                <span>P{n}</span>
                                                                <span className="text-emerald-600">HC: {reg[`p${n}Handicap`]}</span>
                                                            </div>
                                                            <div className="font-bold text-slate-800 truncate text-sm">{reg[`p${n}Name`]}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-32 py-12 border-t border-stone-200 bg-white text-center">
                        <div className="flex justify-center items-center gap-2 mb-4 font-black uppercase italic text-slate-900 tracking-tighter">
                            <Mountain className="text-emerald-700" /> Tour of Bountiful {TOURNAMENT_YEAR}
                        </div>
                        {user && (
                            <div className="text-[10px] font-mono text-stone-400 mb-4 bg-stone-100 inline-block px-3 py-1 rounded-full border border-stone-200">
                                <Settings size={10} className="inline mr-1" /> ADMIN ID: {user.uid}
                            </div>
                        )}
                        <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">54 Holes • Net Score Wins • {TOURNAMENT_DATE}</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
